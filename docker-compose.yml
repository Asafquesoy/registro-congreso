services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SESSION_SECRET=${SESSION_SECRET:-cambiar-este-secreto-en-produccion}
      - ZOHO_EMAIL=${ZOHO_EMAIL:-}
      - ZOHO_PASSWORD=${ZOHO_PASSWORD:-}
    volumes:
      - db_data:/app/data
      - ./images:/app/images
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/registro-abierto"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  db_data:
